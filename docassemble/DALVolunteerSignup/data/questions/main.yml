---
include:
  - docassemble.AssemblyLine:assembly_line.yml
  - docassemble.ALToolbox:copy_button.yml
  - docassemble.LITLabTheme:main.yml
---
features:
  javascript:
    - copy_button.js
  css:
    - copy_button.css
---
modules:
  - .google_sheets
---
metadata:
  title: Document Assembly Line volunteer signup
  description: Learn more about volunteering with the Document Assembly Line.
  link: https://assemblyline.suffolklitlab.org/docs/volunteer/sign_up
---
objects:
  - volunteer: Individual
  - opportunities: DAList
  - languages: DAList
  - litlab_email: DAEmailRecipient.using(name="Suffolk LIT Lab volunteer signup", address="litlab@suffolk.edu")
---
### Interview order ###
mandatory: True
code: |
  welcome
  volunteer.name.first
  volunteer.email
  volunteer.interested_in
  if volunteer.interested_in['organizing']:
    volunteer.has_organizing_experience
  if volunteer.interested_in['legal']:
    volunteer.legal_background
  if volunteer.interested_in['interview_building']:
    volunteer.docassemble_experience
  if volunteer.interested_in['translation']:
    volunteer.languages_known
  if volunteer.interested_in['other']:
    volunteer.other_contributions
  submit
  google_sheet_updated
  email_sent
  thank_you
---
id: welcome
continue button field: welcome
question: Welcome
subquestion: |
  We're excited you're thinking of joining the Document Assembly Line volunteer community!

  To get involved, fill out this form with your interests and experience and we will get in touch as we have capacity. We will need your email address to get in touch.
---
id: name
question: What is your name?
fields:
  - First name: volunteer.name.first
  - Last name: volunteer.name.last
---
id: email
question: What is your email address?
subquestion: |
  We need your email address to contact you about volunteering.
fields:
  - Email address: volunteer.email
    datatype: email
---
code: |
  opportunities = [
    {
      'organizing': "Volunteer organizing",
      'help': "Strengthen our volunteer operations and coordination efforts."
    },
    {
      'legal': "Lending legal subject matter expertise",
      'help': "Help us make sure our interviews are legally accurate for the situation and location."
    },
    {
      'interview_building': "Building and updating forms",
      'help': "Help us build new forms and work through our backlog of form improvements and updates."
    },
    {
      'translation': "Translating",
      'help': "Review form translations for accuracy."
    },
    {
      'other': "Contributing in other ways",
      'help': "Ideas: local community organizers, usability testers, bug hunters, data verifiers, plain language wizards, documentation writers, copy editors, and whatever else you can think of!"
    },
  ]
---
id: interests
question: Which opportunities are you interested in?
subquestion: |
  Click the :circle-question: for a description. For more details, visit the Document Assembly Line [volunteer page](https://assemblyline.suffolklitlab.org/docs/volunteer/sign_up).
datatype: checkboxes
fields:
  - no label: volunteer.interested_in
    datatype: checkboxes
    choices: 
      code: |
        opportunities
    none of the above: False
---
id: Docassemble experience
question: How much experience do you have with Docassemble?
field: volunteer.docassemble_experience
choices:
  - None yet: "None"
  - Some
  - Lots
---
id: legal background
question: Legal background
fields:
  - Describe your legal experience and areas of knowledge: volunteer.legal_background
    input type: area
---
id: ops experience
question: Past organizing experience
fields:
  - Have you had experience coordiating/organizing before?: volunteer.has_organizing_experience
    datatype: yesnoradio
  - Tell us a bit about your experience. Let us know if you have had experience with organizing *volunteers* specifically.: volunteer.organizing_experience
    input type: area
    enable if: volunteer.has_organizing_experience
---
id: other contributions
question: You tell us!
fields:
  - What other ways would you like to contribute and what experience do you have in those areas?: volunteer.other_contributions
    input type: area
---
code: |
  # This is the list of languages we need translators for.
  languages = [
    'Spanish',
    'Portuguese',
    'Haitian Creole',
    'Vietnamese',
    'Khmer',
    'Cape Verdean Creole',
    'Chinese',
    'Other'
  ]
---
id: languages known
question: Which written languages can you translate from English?
subquestion: This list reflects our current needs.
datatype: checkboxes
fields:
  - Select languages: volunteer.languages_known
    datatype: checkboxes
    choices: 
      code: |
        languages
    none of the above: False
  - Other languages: volunteer.other_languages_known
    show if: volunteer.languages_known['Other']
---
id: review
question: Review before sending
subquestion: |
  **Don't leave without clicking the Submit button below!**
  
  Here are your responses:
review:
  - Edit: 
    - volunteer.name.first
    - volunteer.name.last
    button: |
      **Name:** ${ volunteer.name.full() }
  - Edit: volunteer.email
    button: |
      **Email address:** ${ volunteer.email }
  - Edit: volunteer.interested_in
    button: |
      **Opportunities you are interested in:**
      
      % for opp_key in volunteer.interested_in.true_values():
      % for opp in opportunities:
      % if opp_key in opp:
      * ${ opp[ opp_key ] }<br>
      % endif
      % endfor
      % endfor
  - Edit: volunteer.has_organizing_experience
    show if: volunteer.interested_in['organizing']
    button: |
      **Your experience with organizing:**[BR]
      % if volunteer.has_organizing_experience:
      ${ showifdef( volunteer.attr_name('organizing_experience')) or 'None yet' }
      % else:
      None yet
      % endif
  - Edit: volunteer.legal_background
    show if: volunteer.interested_in['legal']
    button: |
      **Legal background:**[BR]
      ${ volunteer.legal_background }
  - Edit: volunteer.docassemble_experience
    show if: volunteer.interested_in['interview_building']
    button: |
      **Your experience with Docassemble:** 
      % if volunteer.interested_in['interview_building']:
      ${ 'None yet' if volunteer.docassemble_experience == 'None' else volunteer.docassemble_experience }
      % else:
      None yet
      % endif
  - Edit: volunteer.languages_known
    show if: volunteer.interested_in['translation']
    button: |
      **Languages you can translate:**
      
      % if volunteer.interested_in['translation']:
      % for lang in volunteer.languages_known.true_values():
      * ${ lang }
      % endfor
      % if volunteer.languages_known['Other']:
      * Other: ${ volunteer.other_languages_known }
      % endif
      % else:
      None
      % endif
  - Edit: volunteer.other_contributions
    show if: volunteer.interested_in['other']
    button: |
      **Other ways you would like to contribute:**[BR]
      ${ volunteer.other_contributions }
      
continue button label: Submit
continue button field: submit
---
code: |
  selected_opportunities = []
  for opp_key in volunteer.interested_in.true_values():
    for opp in opportunities:
      if opp_key in opp:
        selected_opportunities.append( opp[ opp_key ] )
  
  append_to_sheet(
    '1SEFx8ZfrF0VwlRwtBIpTUwMc1Xiaeih2dK6NSCKzcEI',
    [
      volunteer.name.full(),
      volunteer.email,
      comma_list( selected_opportunities ),
      volunteer.docassemble_experience if volunteer.interested_in['interview_building'] else '',
      comma_list( volunteer.languages_known.true_values() ) if volunteer.interested_in['translation'] else '',
      volunteer.other_languages_known if volunteer.interested_in['translation'] and volunteer.languages_known['Other'] else '',
      showifdef( volunteer.attr_name('organizing_experience')),
      url_args.get('source', ''),
      showifdef( volunteer.attr_name('legal_background') ),
      showifdef( volunteer.attr_name('other_contributions') ),
    ]
  )
  google_sheet_updated = True
---
code: |
  email_sent = send_email(
    to=litlab_email,
    reply_to=volunteer,
    template=notification
  )
---
template: notification
subject: ${ volunteer.name.full() } is interested in volunteering!
content: |
  **Name:** ${ volunteer.name.full() }
  
  **Email address:** ${ volunteer.email }

  **${ volunteer.name.first } is interested in:**
      
  % for opp_key in volunteer.interested_in.true_values():
  % for opp in opportunities:
  % if opp_key in opp:
  * ${ opp[ opp_key ] }<br>
  % endif
  % endfor
  % endfor
  
  % if volunteer.interested_in['interview_building']:
  **Experience with Docassemble:** ${ volunteer.docassemble_experience }
  % endif

  % if volunteer.interested_in['translation']:
  **Languages ${ volunteer.name.first } can translate:**
  
  % for lang in volunteer.languages_known.true_values():
  * ${ lang }
  % endfor
  % if volunteer.languages_known['Other']:
  * Other: ${ volunteer.other_languages_known }
  % endif
  % endif

  % if volunteer.interested_in['organizing']:
  **Organizing experience:** ${ showifdef( volunteer.attr_name('organizing_experience') ) or 'None' }
  % endif
---
id: end
event: thank_you
question: Thanks, ${ volunteer.name.first }!
subquestion: |
  We look forward to meeting you! We will get in touch as soon as we are able. In the meantime, you can...

  Share a link to this sign up form:
  ${ copy_button_html( 'https://apps.suffolklitlab.org/interview?i=docassemble.DALVolunteerSignup:main.yml&source=signupformraw', label='Copy the sign up link' )}[BR]

  Share a link to the volunteer info page:
  ${ copy_button_html( 'https://assemblyline.suffolklitlab.org/docs/volunteer/sign_up&source=signupformlinktodocs', label='Copy the info page link' )}[BR]

  And check out [the latest Document Assembly Line updates](https://suffolklitlab.org/category/document-assembly-line/) on the LIT Lab blog.
